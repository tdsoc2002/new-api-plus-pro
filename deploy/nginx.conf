# 源点QuickAPI - Nginx 配置文件
#
# 安装位置：/etc/nginx/sites-available/new-api
#
# 功能特性：
#   - HTTP 自动跳转 HTTPS
#   - Gzip 压缩（减少 60-70% 文件大小）
#   - 静态资源缓存（1年）
#   - HTTP/2 支持
#   - WebSocket 支持
#   - SSL/TLS 优化

# HTTP -> HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name _;  # 如果有域名，改成具体域名
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;  # 如果有域名，改成具体域名

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/new-api.crt;
    ssl_certificate_key /etc/nginx/ssl/new-api.key;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志配置
    access_log /var/log/nginx/new-api-access.log;
    error_log /var/log/nginx/new-api-error.log;

    # Gzip 压缩配置（重要！可减少 60-70% 文件大小）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_min_length 1000;

    # 静态资源缓存（JS, CSS, 图片, 字体等）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # 缓存 1 年（静态资源带版本号，可以长期缓存）
        expires 1y;
        add_header Cache-Control "public, immutable";

        # 传递真实 IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 修复 HTTP/2 协议错误
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # API 请求（不缓存）
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 响应不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 其他请求（HTML 页面等）
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # 传递真实 IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTML 不缓存（确保能获取最新版本）
        add_header Cache-Control "no-cache";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
