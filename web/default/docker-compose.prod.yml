# New-API Docker Compose - 生产环境配置（2GB 内存优化版）
#
# 优化说明：
#   - 使用 SQLite 替代 PostgreSQL（节省 ~200MB 内存）
#   - Redis 限制内存 100MB
#   - 应用限制内存 512MB
#   - 单实例部署
#
# 部署步骤：
#   1. 复制 .env.example 为 .env 并修改配置
#   2. docker-compose -f docker-compose.prod.yml up -d
#   3. 访问 http://your-server-ip:3000

version: '3.8'

services:
  new-api:
    build: .
    image: new-api:${VERSION:-latest}
    container_name: new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # 使用 SQLite（文件数据库，无需额外容器）
      - SQL_DSN=/data/new-api.db
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-prod
    depends_on:
      - redis
    networks:
      - app-network
    # 内存限制（2GB 服务器优化）
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: unless-stopped
    # Redis 内存优化配置
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - app-network
    mem_limit: 128m
    mem_reservation: 64m

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge
