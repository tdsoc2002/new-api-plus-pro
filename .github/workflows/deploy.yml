name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 45m
          script: |
            set -euo pipefail

            APP_DIR="/opt/new-api"
            REPO_URL="https://github.com/tdsoc2002/new-api-plus-pro.git"
            BIN_PATH="${APP_DIR}/new-api"
            GO_VERSION="1.25.1"
            DEPLOY_VERSION="${{ github.sha }}"
            DEPLOY_VERSION="$(printf '%.7s' "${DEPLOY_VERSION}")"
            SUDO_PASSWORD='${{ secrets.SERVER_PASSWORD }}'

            sudo_cmd() {
              if sudo -n true >/dev/null 2>&1; then
                sudo "$@"
              else
                printf '%s\n' "${SUDO_PASSWORD}" | sudo -S "$@"
              fi
            }

            git_retry() {
              for attempt in 1 2 3; do
                if "$@"; then
                  return 0
                fi
                echo "git command failed, retrying ${attempt}/3"
                sleep $((attempt * 5))
              done
              "$@"
            }

            export PATH="${HOME}/.bun/bin:/usr/local/go/bin:${PATH}"

            echo "=== Prepare directories ==="
            sudo_cmd mkdir -p "${APP_DIR}" "${APP_DIR}/data" "${APP_DIR}/logs"
            sudo_cmd chown -R "${USER}:${USER}" "${APP_DIR}"

            echo "=== Ensure Go ${GO_VERSION} ==="
            CURRENT_GO="$(go version 2>/dev/null | awk '{print $3}' | sed 's/^go//' || true)"
            if [ "${CURRENT_GO}" != "${GO_VERSION}" ]; then
              ARCH="$(uname -m)"
              case "${ARCH}" in
                x86_64|amd64) GO_ARCH="amd64" ;;
                aarch64|arm64) GO_ARCH="arm64" ;;
                *) echo "Unsupported architecture: ${ARCH}"; exit 1 ;;
              esac
              curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${GO_ARCH}.tar.gz" -o /tmp/go.tgz
              sudo_cmd rm -rf /usr/local/go
              sudo_cmd tar -C /usr/local -xzf /tmp/go.tgz
              rm -f /tmp/go.tgz
            fi
            go version

            echo "=== Ensure Bun ==="
            if ! command -v bun >/dev/null 2>&1; then
              curl -fsSL https://bun.sh/install | bash
              export PATH="${HOME}/.bun/bin:${PATH}"
            fi
            bun --version

            echo "=== Fetch source ==="
            if [ ! -d "${APP_DIR}/.git" ]; then
              git_retry git clone --depth=1 "${REPO_URL}" "${APP_DIR}"
            fi
            cd "${APP_DIR}"
            git config --global http.version HTTP/1.1 || true
            git remote set-url origin "${REPO_URL}"
            git_retry git fetch --depth=1 origin main
            git checkout -B main FETCH_HEAD
            git reset --hard FETCH_HEAD

            echo "=== Prepare environment ==="
            if [ ! -f "${APP_DIR}/.env" ]; then
              {
                echo "VERSION=${DEPLOY_VERSION}"
                echo "SESSION_SECRET=$(openssl rand -hex 32)"
                echo "SQLITE_PATH=${APP_DIR}/data/one-api.db?_busy_timeout=30000"
                echo "TZ=Asia/Shanghai"
                echo "ERROR_LOG_ENABLED=true"
                echo "BATCH_UPDATE_ENABLED=true"
                echo "MEMORY_CACHE_ENABLED=true"
                echo "NODE_NAME=new-api-prod"
              } > "${APP_DIR}/.env"
            else
              grep -q '^VERSION=' "${APP_DIR}/.env" && sed -i "s/^VERSION=.*/VERSION=${DEPLOY_VERSION}/" "${APP_DIR}/.env" || echo "VERSION=${DEPLOY_VERSION}" >> "${APP_DIR}/.env"
              grep -q '^SESSION_SECRET=' "${APP_DIR}/.env" || echo "SESSION_SECRET=$(openssl rand -hex 32)" >> "${APP_DIR}/.env"
              grep -q '^SQLITE_PATH=' "${APP_DIR}/.env" && sed -i "s|^SQLITE_PATH=.*|SQLITE_PATH=${APP_DIR}/data/one-api.db?_busy_timeout=30000|" "${APP_DIR}/.env" || echo "SQLITE_PATH=${APP_DIR}/data/one-api.db?_busy_timeout=30000" >> "${APP_DIR}/.env"
              grep -q '^TZ=' "${APP_DIR}/.env" || echo "TZ=Asia/Shanghai" >> "${APP_DIR}/.env"
              grep -q '^ERROR_LOG_ENABLED=' "${APP_DIR}/.env" || echo "ERROR_LOG_ENABLED=true" >> "${APP_DIR}/.env"
              grep -q '^BATCH_UPDATE_ENABLED=' "${APP_DIR}/.env" || echo "BATCH_UPDATE_ENABLED=true" >> "${APP_DIR}/.env"
              grep -q '^MEMORY_CACHE_ENABLED=' "${APP_DIR}/.env" || echo "MEMORY_CACHE_ENABLED=true" >> "${APP_DIR}/.env"
              grep -q '^NODE_NAME=' "${APP_DIR}/.env" || echo "NODE_NAME=new-api-prod" >> "${APP_DIR}/.env"
            fi

            echo "=== Build default frontend ==="
            cd "${APP_DIR}/web/default"
            bun install --frozen-lockfile
            DISABLE_ESLINT_PLUGIN=true VITE_REACT_APP_VERSION="$(cat "${APP_DIR}/VERSION")" bun run build

            echo "=== Build classic frontend ==="
            cd "${APP_DIR}/web/classic"
            bun install --frozen-lockfile
            VITE_REACT_APP_VERSION="$(cat "${APP_DIR}/VERSION")" bun run build

            echo "=== Build backend ==="
            cd "${APP_DIR}"
            go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$(cat VERSION)'" -o "${BIN_PATH}.next"
            mv "${BIN_PATH}.next" "${BIN_PATH}"
            chmod +x "${BIN_PATH}"

            echo "=== Install systemd service ==="
            cat > /tmp/new-api.service <<EOF
            [Unit]
            Description=New API Service
            After=network.target

            [Service]
            User=${USER}
            WorkingDirectory=${APP_DIR}
            EnvironmentFile=${APP_DIR}/.env
            ExecStart=${BIN_PATH} --port 3000 --log-dir ${APP_DIR}/logs
            Restart=always
            RestartSec=5
            LimitNOFILE=65535

            [Install]
            WantedBy=multi-user.target
            EOF
            sudo_cmd mv /tmp/new-api.service /etc/systemd/system/new-api.service
            sudo_cmd systemctl daemon-reload
            sudo_cmd systemctl enable new-api

            echo "=== Restart service ==="
            sudo_cmd systemctl restart new-api

            echo "=== Health check ==="
            for i in $(seq 1 60); do
              if curl -fsS "http://localhost:3000/api/status" | grep -q '"success":true'; then
                echo "service healthy"
                sudo_cmd systemctl status new-api --no-pager
                exit 0
              fi
              echo "waiting service ${i}/60"
              sleep 2
            done

            sudo_cmd journalctl -u new-api -n 120 --no-pager
            exit 1
